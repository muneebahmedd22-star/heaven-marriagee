<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Heaven Marriage Bureau</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-body">

  <div class="login-card">
    <h2>HMB Admin Portal</h2>
    
    <div id="error-message" style="display: none; background-color: #f2dede; color: #a94442; padding: 12px; border-radius: 4px; margin-bottom: 20px; font-size: 0.9rem; text-align: center; border: 1px solid #ebccd1;">
      Invalid credentials. Please try again.
    </div>

    <form id="admin-login-form">
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="username">Admin Username</label>
        <input type="text" id="username" placeholder="e.g. admin" required style="width: 100%; height: 44px; margin-top: 5px;">
      </div>
      
      <div class="form-group" style="margin-bottom: 25px;">
        <label for="password">Security Password</label>
        <input type="password" id="password" placeholder="••••••••" required style="width: 100%; height: 44px; margin-top: 5px;">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; height: 46px; border-radius: 6px; font-size: 1rem;">Login</button>
    </form>
    
    <div style="margin-top: 20px; text-align: center; font-size: 0.8rem;">
      <a href="../frontend/index.html" style="color: var(--primary-color); font-weight: 500;">← Back to Public Website</a>
    </div>
  </div>

  <script src="js/admin-api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
